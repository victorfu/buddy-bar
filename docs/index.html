<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuddyBar Updates</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #132033;
      --muted: #5f6b7a;
      --accent: #0f766e;
      --border: #d8e0ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    ul {
      margin: 20px 0 0;
      padding-left: 20px;
      color: var(--text);
    }
    li + li {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>BuddyBar Updates</h1>
      <p>This site hosts BuddyBar's Sparkle appcast feed and release notes.</p>
      <ul>
        <li>Appcast feed: <a href="./updates/appcast.xml"><code>updates/appcast.xml</code></a></li>
        <li>Release notes: <a href="./releases/"><code>releases/</code></a></li>
      </ul>
    </section>
  </main>
</body>
</html>
